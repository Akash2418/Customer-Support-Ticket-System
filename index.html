<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customer Support Ticket Management System</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/form.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<div class="container">

<header>

<h1>Customer Support Ticket Management System</h1>

<button id="addTicketBtn">

+ New Ticket

</button>

</header>

<section class="dashboard">

<div class="card">

<h3>Total Tickets</h3>

<p id="totalTickets">0</p>

</div>

<div class="card">

<h3>Open</h3>

<p id="openTickets">0</p>

</div>

<div class="card">

<h3>In Progress</h3>

<p id="progressTickets">0</p>

</div>

<div class="card">

<h3>Closed</h3>

<p id="closedTickets">0</p>

</div>

</section>

<section class="toolbar">

<input
type="text"
id="searchInput"
placeholder="Search by Ticket ID, Subject or Customer Name"
autocomplete="off">

<select id="statusFilter">

<option value="">All Status</option>

<option value="Open">Open</option>

<option value="In Progress">In Progress</option>

<option value="Closed">Closed</option>

</select>

<select id="priorityFilter">

<option value="">All Priority</option>

<option value="Low">Low</option>

<option value="Medium">Medium</option>

<option value="High">High</option>

</select>

<select id="sortTickets">

<option value="">Sort By</option>

<option value="dateDesc">Newest</option>

<option value="dateAsc">Oldest</option>

<option value="priorityHigh">Priority High-Low</option>

<option value="priorityLow">Priority Low-High</option>

</select>

</section>

<section class="table-container">

<table>

<thead>

<tr>

<th>Ticket ID</th>

<th>Subject</th>

<th>Customer</th>

<th>Email</th>

<th>Priority</th>

<th>Status</th>

<th>Created Date</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="ticketTableBody">

<tr>

<td colspan="8" class="empty-state">

No tickets available.

</td>

</tr>

</tbody>

</table>

</section>

<div id="pagination"></div>

</div>

<div id="ticketModal" class="modal">

<div class="modal-content">

<span class="close">&times;</span>

<h2 id="modalTitle">

Create Ticket

</h2>

<form id="ticketForm">

<div class="form-group">

<label>

Ticket ID

</label>

<input
type="text"
id="ticketId"
readonly>

</div>

<div class="form-group">

<label>

Subject

<span class="required">*</span>

</label>

<input
type="text"
id="subject"
placeholder="Enter subject"
autocomplete="off"
required>

</div>

<div class="form-group">

<label>

Customer Name

<span class="required">*</span>

</label>

<input
type="text"
id="customer"
placeholder="Enter customer name"
autocomplete="off"
required>

</div>

<div class="form-group">

<label>

Email

<span class="required">*</span>

</label>

<input
type="email"
id="email"
placeholder="Enter email address"
autocomplete="email"
required>

</div>

<div class="form-group">

<label>

Description

<span class="required">*</span>

</label>

<textarea
id="description"
rows="5"
placeholder="Describe the issue"
required></textarea>

</div>

<div class="form-group">

<label>

Priority

<span class="required">*</span>

</label>

<select id="priority" required>

<option value="">Select Priority</option>

<option>Low</option>

<option>Medium</option>

<option>High</option>

</select>

</div>

<div class="form-group">

<label>

Status

<span class="required">*</span>

</label>

<select id="status" required>

<option value="">Select Status</option>

<option>Open</option>

<option>In Progress</option>

<option>Closed</option>

</select>

</div>

<button
type="submit"
id="saveTicketBtn">

Save Ticket

</button>

</form>

</div>

</div>

<div id="viewModal" class="modal">

<div class="modal-content">

<span class="closeView">&times;</span>

<h2>

Ticket Details

</h2>

<div id="ticketDetails"></div>

</div>

</div>

<footer>

<p>

© 2026 Customer Support Ticket Management System

</p>

</footer>

<script src="js/storage.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/tickets.js"></script>
<script src="js/validation.js"></script>
<script src="js/modal.js"></script>
<script src="js/searchFilter.js"></script>
<script src="js/pagination.js"></script>
<script src="js/app.js"></script>

</body>

</html>
